<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Rakoor - PELCAR</title>
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body>

    <div class="container">
        <div class="header-logo">
            <img src="image_0e68f9.png" alt="Logo Pelcar" class="logo-pelcar">
            <h2>DATABASE PENYIMPANAN RAKOOR</h2>
            <p>DIVISI SPONSORSHIP POLBAN EV</p>
        </div>

        <form id="absensiForm">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Masukkan nama lengkap Anda..." required>
            </div>

            <div class="form-group">
                <label for="status">Status Kehadiran</label>
                <select id="status" required>
                    <option value="Hadir">Hadir</option>
                    <option value="Telat">Telat</option>
                    <option value="Izin">Izin</option>
                    <option value="Tanpa Keterangan">Tanpa Keterangan</option>
                </select>
            </div>

            <div class="form-group">
                <label for="keterangan">Keterangan Tambahan (Opsional)</label>
                <textarea id="keterangan" rows="3" placeholder="Contoh: Sedang dijalan, Ban bocor, Urusan keluarga, dll."></textarea>
            </div>

            <div class="form-group" id="buktiGroup" style="display: none;">
                <label for="bukti">Unggah Bukti (Image, Word, PDF, dll)</label>
                <input type="file" id="bukti" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx">
            </div>

            <button type="submit" class="btn-submit">Submit Absensi</button>
        </form>

        <div class="table-container">
            <div class="table-header">
                <h3>Daftar Kehadiran Anggota</h3>
                <button id="btnClear" class="btn-reset">Reset Semua Data</button>
            </div>
            
            <table id="tabelAbsensi">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Waktu</th>
                        <th>Nama</th>
                        <th>Status</th>
                        <th>Keterangan</th>
                        <th>Bukti</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js?v=1.2"></script>
</body>
</html>
