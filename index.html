<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Digital Modern</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>SISTEM ABSENSI DIGITAL RAKOOR</h2>
        
        <div class="card form-container">
            <h3>Form Absen Kehadiran</h3>
            <form id="absensiForm">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama lengkap Anda..." required>
                </div>
                
                <div class="form-group">
                    <label for="status">Status Kehadiran</label>
                    <select id="status">
                        <option value="Hadir">Hadir (Tepat Waktu)</option>
                        <option value="Telat">Telat</option>
                        <option value="Izin">Izin / Sakit</option>
                        <option value="Tanpa Keterangan">Tanpa Keterangan (Alfa)</option>
                    </select>
                </div>

                <div class="form-group id-bukti-group" id="buktiGroup" style="display: none;">
                    <label for="bukti">Unggah Bukti (Foto / Surat Dokter / Screenshot)</label>
                    <input type="file" id="bukti" accept="image/*,.pdf">
                </div>

                <div class="form-group">
                    <label for="keterangan">Keterangan Tambahan</label>
                    <input type="text" id="keterangan" placeholder="Contoh: Ban bocor, urusan keluarga, dll.">
                </div>

                <button type="submit" class="btn-submit">Submit Absensi</button>
            </form>
        </div>

        <div class="card table-container">
            <div class="table-header">
                <h3>Daftar Kehadiran Anggota</h3>
                <button id="btnClear" class="btn-danger">Reset Semua Data</button>
            </div>
            <div class="responsive-table">
                <table id="tabelAbsensi">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Waktu</th>
                            <th>Nama</th>
                            <th>Status</th>
                            <th>Keterangan</th>
                            <th>Bukti</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
